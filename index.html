<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام متابعة صيانة السيارات</title>
  <link rel="stylesheet" href="./styles/main.css"/>
  <style>
    .splash {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--clr-bg);
    }
    .splash-logo {
      width: 64px;
      height: 64px;
      background: var(--clr-primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .splash-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--clr-text-1);
    }
    .splash-sub {
      font-size: .9rem;
      color: var(--clr-text-3);
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--clr-border);
      border-top-color: var(--clr-primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #991b1b;
      background: #fee2e2;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: .9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-logo">🚗</div>
    <div class="splash-title">نظام متابعة صيانة السيارات</div>
    <div class="splash-sub">هيئة الأمر بالمعروف والنهي عن المنكر — منطقة جازان</div>
    <div class="spinner" id="spinner"></div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const BASE = "/car-maintenance-system";
    const ROLE_PAGES = {
      owner:     BASE + "/pages/owner.html",
      tech:      BASE + "/pages/tech.html",
      manager:   BASE + "/pages/admin.html",
      it:        BASE + "/pages/it.html",
      developer: BASE + "/pages/developer.html",
    };

    // انتظر 3 ثوانٍ كحد أقصى ثم وجّه لصفحة الدخول
    const timeout = setTimeout(() => {
      window.location.href = BASE + "/pages/login.html";
    }, 3000);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        clearTimeout(timeout);
        window.location.href = BASE + "/pages/login.html";
        return;
      }
      try {
        const snap = await getDoc(doc(db, "users", user.uid));
        clearTimeout(timeout);
        if (!snap.exists() || snap.data().frozen) {
          await auth.signOut();
          window.location.href = BASE + "/pages/login.html";
          return;
        }
        const target = ROLE_PAGES[snap.data().role];
        window.location.href = target || BASE + "/pages/login.html";
      } catch {
        clearTimeout(timeout);
        window.location.href = BASE + "/pages/login.html";
      }
    });
  </script>
</body>
</html>
