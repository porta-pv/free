<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — الصفحة غير موجودة</title>
  <link rel="stylesheet" href="./styles/main.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--clr-bg);
      padding: 24px;
    }
    .error-wrap {
      text-align: center;
      max-width: 400px;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: var(--clr-primary);
      line-height: 1;
      margin-bottom: 8px;
      opacity: .15;
    }
    .error-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--clr-text-1);
      margin-bottom: 8px;
    }
    .error-sub {
      font-size: .9rem;
      color: var(--clr-text-3);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .error-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <div class="error-icon">🔍</div>
    <div class="error-title">الصفحة غير موجودة</div>
    <div class="error-sub">
      الرابط الذي طلبته غير موجود أو تم نقله.<br/>
      تحقق من الرابط أو عُد للصفحة الرئيسية.
    </div>
    <div class="error-actions">
      <button class="btn btn-primary" onclick="goHome()">العودة للرئيسية</button>
      <button class="btn btn-ghost" onclick="history.back()">الصفحة السابقة</button>
    </div>
  </div>

  <script>
    function goHome() {
      const base = window.location.pathname.includes("/car-maintenance-system")
        ? "/car-maintenance-system" : "";
      window.location.href = base + "/index.html";
    }
  </script>
</body>
</html>
